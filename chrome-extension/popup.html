<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girlfriend Gatekeeper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: #0f0f18;
      color: #fff;
      padding: 20px 18px 24px;
    }

    h1 {
      font-size: 1rem;
      color: #ff6b9d;
      margin-bottom: 2px;
    }
    .sub { font-size: 0.75rem; color: #444; margin-bottom: 18px; }

    .section { margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }

    input[type="number"], input[type="text"], textarea {
      width: 100%;
      background: #1a1a28;
      border: 1px solid #252535;
      border-radius: 6px;
      color: #fff;
      padding: 7px 10px;
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
    }
    input[type="number"] { width: 80px; }
    input[type="number"]:focus, input[type="text"]:focus, textarea:focus {
      border-color: #ff6b9d;
    }

    textarea { height: 60px; resize: vertical; }

    .photo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .photo-preview {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ff6b9d;
      display: none;
    }
    .photo-preview.visible { display: block; }

    .upload-btn {
      flex: 1;
      padding: 8px 0;
      background: #1a1a28;
      border: 1px dashed #ff6b9d;
      border-radius: 8px;
      color: #ff6b9d;
      font-size: 0.82rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }
    .upload-btn:hover { background: #241224; }

    .row { display: flex; align-items: center; gap: 8px; }
    .row span { font-size: 0.82rem; color: #555; }

    .stats {
      background: #141420;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.8rem;
      color: #666;
      max-height: 100px;
      overflow-y: auto;
      margin-bottom: 4px;
    }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .stat-row .site { color: #888; }
    .stat-row .mins { color: #ff6b9d; font-weight: 700; }

    .btn-row { display: flex; gap: 8px; margin-top: 16px; }

    button.primary {
      flex: 1;
      padding: 10px 0;
      background: #ff6b9d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    button.primary:hover { background: #e05585; }

    button.ghost {
      padding: 10px 14px;
      background: #1a1a28;
      color: #888;
      border: 1px solid #252535;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    button.ghost:hover { color: #fff; border-color: #555; }

    .saved { color: #07C160; font-size: 0.78rem; opacity: 0; transition: opacity 0.3s; text-align: center; margin-top: 6px; }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>💕 Girlfriend Gatekeeper</h1>
  <div class="sub">刷社交媒体超时，女友照片全屏提醒</div>

  <!-- Photo upload -->
  <div class="section">
    <label>女友照片</label>
    <div class="photo-area">
      <img class="photo-preview" id="preview" src="" alt="">
      <label class="upload-btn" for="photoInput">
        📸 上传照片 / GIF
        <input type="file" id="photoInput" accept="image/*" style="display:none">
      </label>
    </div>
  </div>

  <!-- Message -->
  <div class="section">
    <label>提示消息</label>
    <textarea id="message" placeholder="宝贝说：该休息了 ❤️"></textarea>
  </div>

  <!-- Time settings -->
  <div class="section">
    <label>时间设置</label>
    <div class="row">
      <span>时间上限</span>
      <input type="number" id="limitMin" min="1" max="180" value="15">
      <span>分钟</span>
      <span style="margin-left:8px">休息</span>
      <input type="number" id="breakMin" min="1" max="60" value="5">
      <span>分钟</span>
    </div>
  </div>

  <!-- Tracked sites -->
  <div class="section">
    <label>追踪站点（每行一个域名）</label>
    <textarea id="sites" style="height:80px" placeholder="bilibili.com&#10;youtube.com&#10;tiktok.com"></textarea>
  </div>

  <!-- Today's stats -->
  <div class="section">
    <label>今日使用统计</label>
    <div class="stats" id="stats">
      <span style="color:#333">暂无数据</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="ghost" id="resetBtn">重置计时</button>
    <button class="primary" id="saveBtn">保存设置</button>
  </div>
  <div class="saved" id="savedMsg">✓ 已保存</div>

  <script src="popup.js"></script>
</body>
</html>
